<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DocInfo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    pre { background: #f4f4f4; padding: 10px; border: 1px solid #ccc; white-space: pre-wrap; }
    h2 { color: #333; }
  </style>
</head>
<body>
  <h1>Documentos publicados</h1>

  <h2>DOC-INFO_part1.txt</h2>
  <pre id="file1"></pre>

  <h2>DOC-INFO_part2.txt</h2>
  <pre id="file2"></pre>

  <h2>DOC-INFO_part3.txt</h2>
  <pre id="file3"></pre>

  <script>
    async function loadFile(id, filename) {
      const response = await fetch(filename);
      const text = await response.text();
      document.getElementById(id).textContent = text;
    }

    loadFile("file1", "DOC-INFO_part1.txt");
    loadFile("file2", "DOC-INFO_part2.txt");
    loadFile("file3", "DOC-INFO_part3.txt");
  </script>
</body>
</html>
